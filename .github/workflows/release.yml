name: Build Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      current: ${{ steps.version.outputs.current }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version change
        id: version
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          current=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          echo "current=${current}" >> "$GITHUB_OUTPUT"
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous=$(git show "${BEFORE_SHA}:Cargo.toml" | grep -m1 '^version' | sed 's/.*"\(.*\)".*/\1/')
          if [[ "${previous}" == "${current}" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: steel
          - os: windows-latest
            artifact: steel.exe
          - os: macos-latest
            artifact: steel
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build portable release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --features stand-alone,deadlock_detection --verbose
      - uses: actions/upload-artifact@v4
        with:
          name: steel-${{ matrix.os }}
          path: target/release/${{ matrix.artifact }}

  release:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          mv artifacts/steel-ubuntu-latest/steel release/steel-linux
          mv artifacts/steel-windows-latest/steel.exe release/steel-windows.exe
          mv artifacts/steel-macos-latest/steel release/steel-macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.current }}
          name: v${{ needs.version.outputs.current }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: true

      - name: Trigger release workflows
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.version.outputs.current }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/dispatches" \
            -f event_type=steel-released \
            -f "client_payload[tag]=${RELEASE_TAG}" \
            -f "client_payload[sha]=${GITHUB_SHA}"

  notify:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to SteelDocs
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          repository: Steel-Foundation/SteelDocs
          event-type: steel-released
