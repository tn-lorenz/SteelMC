# https://github.com/bevyengine/bevy/blob/main/.cargo/config_fast_builds.toml for more details

[build]
rustflags = ["-Zthreads=0", "-Ctarget-cpu=native"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-fuse-ld=lld"]
